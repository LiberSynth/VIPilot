- key: text_prompt
  value: |-
    Придумай один виральный сюжет для вертикального видео. История НЕ про ремонт. Ремонт или стройка — это фон или случайный элемент. В центре — обычная жизнь, например: отношения, бытовые ситуации, работа, творчество, учёба, хобби, спорт, свидания, семейные дела, праздники, путешествия, утро, вечер, готовка, сон, покупки, общение с друзьями.

    Это ПРИМЕРЫ, а не строгий список. Ты можешь выбрать любое другое действие из обычной жизни.

    Один элемент из стройматериалов или инструментов присутствует в кадре как деталь, но сюжет строится вокруг другого.

    Структура: герой что-то делает из обычной жизни → случайное взаимодействие со стройматериалом или инструментом → нелепая ситуация → короткая смешная или ироничная реплика.

    Опиши: возраст героя в скобках, его одежду, фон, наличие музыки или тишины.

    Все действия должны быть визуально воспроизводимыми.

    Вот примеры хороших сюжетов. Не копируй их, но ориентируйся на стиль и принцип «ремонт как фон»:

    {список_образцов}
- key: video_duration
  value: '10'
- key: video_post_prompt
  value: |-
    Генерируй видео ТОЛЬКО СО ЗВУКОМ. Продолжительность ролика {продолжительность} секунд. Любая речь СТРОГО НА РУССКОМ ЯЗЫКЕ, НЕ ЭМУЛЯЦИЯ, НЕ ПОДДЕЛКА ПОД РУССКИЙ ЯЗЫК.

    Будь внимателен к окончанию ролика. Делай конец плавным. Не обрезай конец резко. Не обрезай на незаконченной фразе или незаконченном действии. Последняя секунда видео - хвост последнего события сюжета без каких-либо новых деталей, действий и реплик.

    НИКОГДА НЕ ДУБЛИРУЙ РЕПЛИКИ ИЗ ПРОМПТА! ЕСЛИ В ПРОМПТЕ ФРАЗА НЕ ПОВТОРЯЕТСЯ - НЕ ПОВТОРЯЙ ЕЕ В ВИДЕО!
    НЕ ДОБАВЛЯЙ РЕПЛИКИ, НЕ ЗАДАННЫЕ В ПРОМПТЕ! ГЕНЕРИРУЙ РЕПЛИКИ ИСКЛЮЧИТЕЛЬНО В СООТВЕТСТВИИ С ПРОМПТОМ!
    СОБЛЮДАЙ ПОРЯДОК СОБЫТИЙ В ПРОМПТЕ И МЕСТО, ГДЕ ЗВУЧАТ РЕПЛИКИ!
- key: format_prompt
  value: |-
    Ты генерируешь только один короткий промпт для модели text-to-video, чтобы получить вертикальное видео формата Shorts/Reels/Stories. Никаких пояснений, вопросов и заголовков. Первый ответ — только чистый текст промпта с его названием. Без маркдауна, без другой разметки и каких-либо спецсимволов. На русском языке. Знаки препинания и кавычки в прямой речи обязательны.

    Первая строка - название сюжета БЕЗ ТОЧКИ В КОНЦЕ, без кавычек, спецсимволов, знаков и разметки. После нее 2 (ДВА) переноса строки и текст промпта.

    Количество слов в сценарии {количество_слов}. Продолжительность видео {продолжительность} секунд.

    Если герой произносит реплику, обязательно указывай "НА РУССКОМ ЯЗЫКЕ" перед ней. Без пауз в речи.
