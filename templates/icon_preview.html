<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #111118;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 32px;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    color: #aaa;
  }
  h2 {
    font-size: 11px;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    color: #444;
    margin-bottom: 32px;
    font-weight: 500;
  }
  .row {
    display: flex;
    gap: 20px;
    align-items: flex-start;
  }
  .variant {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    width: 130px;
  }
  .icon-box {
    width: 80px;
    height: 80px;
    background: #1a1a24;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid #2a2a38;
  }
  .icon-box svg { width: 36px; height: 36px; color: #c0c0d0; }
  .mini-box {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #1a1a24;
    border-radius: 6px;
    padding: 5px 8px;
    border: 1px solid #2a2a38;
  }
  .mini-box svg { width: 12px; height: 12px; color: #888; flex-shrink: 0; }
  .mini-text {
    font-size: 11px;
    color: #666;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 80px;
  }
  .label {
    font-size: 11px;
    color: #555;
    text-align: center;
    line-height: 1.5;
  }
  .label strong {
    display: block;
    color: #888;
    font-size: 12px;
    margin-bottom: 2px;
  }
</style>
</head>
<body>

<h2>Иконка «Отредактировано вручную» — варианты</h2>

<div class="row">

  <!-- А: Карандаш -->
  <div class="variant">
    <div class="icon-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
      </svg>
    </div>
    <div class="mini-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
      </svg>
      <span class="mini-text">Название</span>
    </div>
    <div class="label"><strong>А — Карандаш</strong>стандартная иконка редактирования</div>
  </div>

  <!-- Б: Перо -->
  <div class="variant">
    <div class="icon-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"/>
        <line x1="16" y1="8" x2="2" y2="22"/>
        <line x1="17.5" y1="15" x2="9" y2="15"/>
      </svg>
    </div>
    <div class="mini-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"/>
        <line x1="16" y1="8" x2="2" y2="22"/>
        <line x1="17.5" y1="15" x2="9" y2="15"/>
      </svg>
      <span class="mini-text">Название</span>
    </div>
    <div class="label"><strong>Б — Перо</strong>авторство / письмо</div>
  </div>

  <!-- В: Рука -->
  <div class="variant">
    <div class="icon-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 11V5a2 2 0 0 1 4 0v6"/>
        <path d="M13 11V9a2 2 0 0 1 4 0v5a7 7 0 0 1-14 0v-3a2 2 0 0 1 4 0v1"/>
      </svg>
    </div>
    <div class="mini-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 11V5a2 2 0 0 1 4 0v6"/>
        <path d="M13 11V9a2 2 0 0 1 4 0v5a7 7 0 0 1-14 0v-3a2 2 0 0 1 4 0v1"/>
      </svg>
      <span class="mini-text">Название</span>
    </div>
    <div class="label"><strong>В — Рука</strong>ручной ввод</div>
  </div>

  <!-- Г: Пользователь -->
  <div class="variant">
    <div class="icon-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </div>
    <div class="mini-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span class="mini-text">Название</span>
    </div>
    <div class="label"><strong>Г — Человек</strong>человек = вручную</div>
  </div>

  <!-- Д: Текстовый курсор -->
  <div class="variant">
    <div class="icon-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="4 7 4 4 20 4 20 7"/>
        <line x1="9" y1="20" x2="15" y2="20"/>
        <line x1="12" y1="4" x2="12" y2="20"/>
      </svg>
    </div>
    <div class="mini-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="4 7 4 4 20 4 20 7"/>
        <line x1="9" y1="20" x2="15" y2="20"/>
        <line x1="12" y1="4" x2="12" y2="20"/>
      </svg>
      <span class="mini-text">Название</span>
    </div>
    <div class="label"><strong>Д — Текст</strong>набор текста руками</div>
  </div>

  <!-- Е: Клавиатура -->
  <div class="variant">
    <div class="icon-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="6" width="20" height="13" rx="2"/>
        <path d="M6 10h.01M10 10h.01M14 10h.01M18 10h.01M8 14h8"/>
      </svg>
    </div>
    <div class="mini-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="6" width="20" height="13" rx="2"/>
        <path d="M6 10h.01M10 10h.01M14 10h.01M18 10h.01M8 14h8"/>
      </svg>
      <span class="mini-text">Название</span>
    </div>
    <div class="label"><strong>Е — Клавиатура</strong>буквально «напечатано»</div>
  </div>

</div>

</body>
</html>
