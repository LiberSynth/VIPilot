<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>VIPilot — Выбор модуля</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f13;
    color: #e8e8f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #1a1a24;
    border: 1px solid #2a2a38;
    border-radius: 16px;
    padding: 36px 28px;
    width: 100%;
    max-width: 360px;
  }
  .logo {
    text-align: center;
    margin-bottom: 28px;
  }
  .logo-icon {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, #5062f7, #8040f0);
    border-radius: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    margin-bottom: 12px;
  }
  h1 { font-size: 20px; font-weight: 600; color: #fff; }
  .subtitle {
    font-size: 13px;
    color: #999;
    margin-top: 6px;
    margin-bottom: 24px;
    text-align: center;
  }
  .module-btn {
    display: block;
    width: 100%;
    background: linear-gradient(135deg, #4a7cf7, #6f4af7);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: .06em;
    cursor: pointer;
    margin-bottom: 12px;
    text-decoration: none;
    text-align: center;
    transition: opacity .15s;
  }
  .module-btn:last-child { margin-bottom: 0; }
  .module-btn:active { opacity: .85; }
  .logout-link {
    display: block;
    text-align: center;
    margin-top: 20px;
    font-size: 13px;
    color: #555570;
    text-decoration: none;
  }
  .logout-link:hover { color: #888; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg width="36" height="36" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg" overflow="visible" shape-rendering="geometricPrecision">
        <circle cx="2" cy="37" r="4" fill="#00E8FF" opacity="0.9"/>
        <circle cx="14" cy="29" r="3.5" fill="#00E8FF" opacity="0.75"/>
        <circle cx="2" cy="25" r="3" fill="#00E8FF" opacity="0.7"/>
        <circle cx="10" cy="41" r="2.5" fill="#00E8FF" opacity="0.6"/>
        <line x1="2" y1="37" x2="14" y2="29" stroke="#00E8FF" stroke-width="1.2" opacity="0.5"/>
        <line x1="2" y1="25" x2="14" y2="29" stroke="#00E8FF" stroke-width="1.2" opacity="0.4"/>
        <line x1="2" y1="37" x2="10" y2="41" stroke="#00E8FF" stroke-width="1" opacity="0.4"/>
        <rect x="23.2" y="0.4" width="21.6" height="31.2" rx="4.8" fill="none" stroke="#E87840" stroke-width="3.45" opacity="0.9"/>
        <path d="M30.4 11.2 L30.4 20.8 L38.8 16 Z" fill="#E87840" opacity="0.9"/>
      </svg>
    </div>
    <h1>VIPilot</h1>
  </div>
  <div class="subtitle">Выберите модуль для работы</div>
  {% for role in roles %}
  <a href="{{ role.url }}" class="module-btn">{{ role.module }}</a>
  {% endfor %}
  <a href="/logout" class="logout-link">Выйти</a>
</div>
</body>
</html>
