<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>VisionForge — Вход</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f13;
    color: #e8e8f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #1a1a24;
    border: 1px solid #2a2a38;
    border-radius: 16px;
    padding: 36px 28px;
    width: 100%;
    max-width: 360px;
  }
  .logo {
    text-align: center;
    margin-bottom: 28px;
  }
  .logo-icon {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, #4a7cf7, #6f4af7);
    border-radius: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    margin-bottom: 12px;
  }
  h1 { font-size: 20px; font-weight: 600; color: #fff; }
  .subtitle { font-size: 13px; color: #666; margin-top: 4px; }
  .field { margin-bottom: 16px; }
  label { display: block; font-size: 13px; color: #999; margin-bottom: 6px; font-weight: 500; }
  input[type=password] {
    width: 100%;
    background: #0f0f13;
    border: 1px solid #2a2a38;
    border-radius: 10px;
    padding: 13px 16px;
    font-size: 16px;
    color: #e8e8f0;
    outline: none;
    transition: border-color .2s;
  }
  input[type=password]:focus { border-color: #4a7cf7; }
  .error {
    background: rgba(255,80,80,.12);
    border: 1px solid rgba(255,80,80,.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: #ff6060;
    margin-bottom: 16px;
  }
  button {
    width: 100%;
    background: linear-gradient(135deg, #4a7cf7, #6f4af7);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
  }
  button:active { opacity: .85; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" fill="none" width="46" height="46">
        <!-- Телефон: правее и выше -->
        <rect x="22" y="1.5" width="18" height="27" rx="4" stroke="#E87840" stroke-width="2.2" fill="rgba(232,120,64,0.08)"/>
        <rect x="26.5" y="4" width="9" height="2" rx="1" fill="#E87840" opacity="0.55"/>
        <rect x="28.5" y="26" width="5" height="1.5" rx="0.75" fill="#E87840" opacity="0.55"/>
        <path d="M27 12 L27 20 L35 16 Z" fill="#E87840" opacity="0.95"/>
        <!-- Нейросеть: слева и ниже -->
        <circle cx="11" cy="31" r="2.5" fill="#00E8FF"/>
        <circle cx="11" cy="23.5" r="1.8" fill="#00E8FF" opacity="0.85"/>
        <circle cx="17.5" cy="27" r="1.8" fill="#00E8FF" opacity="0.85"/>
        <circle cx="17.5" cy="35" r="1.8" fill="#00E8FF" opacity="0.85"/>
        <circle cx="11" cy="38.5" r="1.8" fill="#00E8FF" opacity="0.85"/>
        <circle cx="4.5" cy="35" r="1.8" fill="#00E8FF" opacity="0.85"/>
        <circle cx="4.5" cy="27" r="1.8" fill="#00E8FF" opacity="0.85"/>
        <line x1="11" y1="31" x2="11" y2="23.5" stroke="#00E8FF" stroke-width="1.3" opacity="0.5"/>
        <line x1="11" y1="31" x2="17.5" y2="27" stroke="#00E8FF" stroke-width="1.3" opacity="0.5"/>
        <line x1="11" y1="31" x2="17.5" y2="35" stroke="#00E8FF" stroke-width="1.3" opacity="0.5"/>
        <line x1="11" y1="31" x2="11" y2="38.5" stroke="#00E8FF" stroke-width="1.3" opacity="0.5"/>
        <line x1="11" y1="31" x2="4.5" y2="35" stroke="#00E8FF" stroke-width="1.3" opacity="0.5"/>
        <line x1="11" y1="31" x2="4.5" y2="27" stroke="#00E8FF" stroke-width="1.3" opacity="0.5"/>
        <line x1="11" y1="23.5" x2="17.5" y2="27" stroke="#00E8FF" stroke-width="0.9" opacity="0.3"/>
        <line x1="17.5" y1="27" x2="17.5" y2="35" stroke="#00E8FF" stroke-width="0.9" opacity="0.3"/>
        <line x1="17.5" y1="35" x2="11" y2="38.5" stroke="#00E8FF" stroke-width="0.9" opacity="0.3"/>
        <line x1="11" y1="38.5" x2="4.5" y2="35" stroke="#00E8FF" stroke-width="0.9" opacity="0.3"/>
        <line x1="4.5" y1="35" x2="4.5" y2="27" stroke="#00E8FF" stroke-width="0.9" opacity="0.3"/>
        <line x1="4.5" y1="27" x2="11" y2="23.5" stroke="#00E8FF" stroke-width="0.9" opacity="0.3"/>
        <!-- Коннектор пунктирный -->
        <path d="M18 27 C19.5 24 20.5 22 22 19" stroke="white" stroke-width="1.6" fill="none" opacity="0.4" stroke-linecap="round" stroke-dasharray="2.5 2"/>
      </svg>
    </div>
    <h1>VisionForge</h1>
    <div class="subtitle">ROOT</div>
  </div>
  {% if error %}
  <div class="error">Неверный пароль</div>
  {% endif %}
  <form method="post">
    <div class="field">
      <label>Пароль</label>
      <input type="password" name="password" autofocus placeholder="Введите пароль">
    </div>
    <button type="submit">Войти</button>
  </form>
</div>
</body>
</html>
