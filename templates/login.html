<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>VIPilot — Вход</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f13;
    color: #e8e8f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #1a1a24;
    border: 1px solid #2a2a38;
    border-radius: 16px;
    padding: 36px 28px;
    width: 100%;
    max-width: 360px;
  }
  .logo {
    text-align: center;
    margin-bottom: 28px;
  }
  .logo-icon {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, #5062f7, #8040f0);
    border-radius: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    margin-bottom: 12px;
  }
  h1 { font-size: 20px; font-weight: 600; color: #fff; }
  .subtitle { font-size: 13px; color: #666; margin-top: 4px; }
  .field { margin-bottom: 16px; }
  label { display: block; font-size: 13px; color: #999; margin-bottom: 6px; font-weight: 500; }
  input[type=password] {
    width: 100%;
    background: #0f0f13;
    border: 1px solid #2a2a38;
    border-radius: 10px;
    padding: 13px 16px;
    font-size: 16px;
    color: #e8e8f0;
    outline: none;
    transition: border-color .2s;
  }
  input[type=password]:focus { border-color: #4a7cf7; }
  .error {
    background: rgba(255,80,80,.12);
    border: 1px solid rgba(255,80,80,.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: #ff6060;
    margin-bottom: 16px;
  }
  button {
    width: 100%;
    background: linear-gradient(135deg, #4a7cf7, #6f4af7);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
  }
  button:active { opacity: .85; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" fill="none" width="40" height="40" overflow="visible">
        <circle cx="3" cy="37" r="4" fill="#00E8FF" opacity="0.9"/>
        <circle cx="15" cy="29" r="3.5" fill="#00E8FF" opacity="0.75"/>
        <circle cx="3" cy="25" r="3" fill="#00E8FF" opacity="0.7"/>
        <circle cx="11" cy="41" r="2.5" fill="#00E8FF" opacity="0.6"/>
        <line x1="3" y1="37" x2="15" y2="29" stroke="#00E8FF" stroke-width="1.2" opacity="0.5"/>
        <line x1="3" y1="25" x2="15" y2="29" stroke="#00E8FF" stroke-width="1.2" opacity="0.4"/>
        <line x1="3" y1="37" x2="11" y2="41" stroke="#00E8FF" stroke-width="1" opacity="0.4"/>
        <rect x="30" y="6" width="18" height="26" rx="4" fill="none" stroke="#E87840" stroke-width="2.3" opacity="0.9"/>
        <path d="M36 15 L36 23 L43 19 Z" fill="#E87840" opacity="0.9"/>
        <path d="M15 29 C18 26 23 22 28 17" stroke="white" stroke-width="1.4" fill="none" opacity="0.35" stroke-linecap="round" stroke-dasharray="2.5 2"/>
      </svg>
    </div>
    <h1>VIPilot</h1>
    <div class="subtitle">ROOT</div>
  </div>
  {% if error %}
  <div class="error">Неверный пароль</div>
  {% endif %}
  <form method="post">
    <div class="field">
      <label>Пароль</label>
      <input type="password" name="password" autofocus placeholder="Введите пароль">
    </div>
    <button type="submit">Войти</button>
  </form>
</div>
</body>
</html>
