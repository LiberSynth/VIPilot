<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Red Brick Core — Вход</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f13;
    color: #e8e8f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #1a1a24;
    border: 1px solid #2a2a38;
    border-radius: 16px;
    padding: 36px 28px;
    width: 100%;
    max-width: 360px;
  }
  .logo {
    text-align: center;
    margin-bottom: 28px;
  }
  .logo-icon {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, #4a7cf7, #6f4af7);
    border-radius: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    margin-bottom: 12px;
  }
  h1 { font-size: 20px; font-weight: 600; color: #fff; }
  .subtitle { font-size: 13px; color: #666; margin-top: 4px; }
  .field { margin-bottom: 16px; }
  label { display: block; font-size: 13px; color: #999; margin-bottom: 6px; font-weight: 500; }
  input[type=password] {
    width: 100%;
    background: #0f0f13;
    border: 1px solid #2a2a38;
    border-radius: 10px;
    padding: 13px 16px;
    font-size: 16px;
    color: #e8e8f0;
    outline: none;
    transition: border-color .2s;
  }
  input[type=password]:focus { border-color: #4a7cf7; }
  .error {
    background: rgba(255,80,80,.12);
    border: 1px solid rgba(255,80,80,.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: #ff6060;
    margin-bottom: 16px;
  }
  button {
    width: 100%;
    background: linear-gradient(135deg, #4a7cf7, #6f4af7);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
  }
  button:active { opacity: .85; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" width="34" height="34">
        <!-- Phone outline -->
        <rect x="17" y="3" width="12" height="20" rx="2.5" stroke="white" stroke-width="1.5" fill="none" opacity="0.95"/>
        <!-- Phone notch -->
        <rect x="20.5" y="5" width="5" height="1" rx="0.5" fill="white" opacity="0.5"/>
        <!-- Phone home bar -->
        <rect x="21.5" y="21" width="3" height="1" rx="0.5" fill="white" opacity="0.5"/>
        <!-- Play button inside phone -->
        <path d="M22 11.5 L22 16.5 L26.5 14 Z" fill="white" opacity="0.9"/>

        <!-- Network node: center -->
        <circle cx="9" cy="16" r="1.4" fill="white"/>
        <!-- Network nodes outer ring -->
        <circle cx="9" cy="9.5" r="1.1" fill="white" opacity="0.85"/>
        <circle cx="14.5" cy="12.5" r="1.1" fill="white" opacity="0.85"/>
        <circle cx="14.5" cy="19.5" r="1.1" fill="white" opacity="0.85"/>
        <circle cx="9" cy="22.5" r="1.1" fill="white" opacity="0.85"/>
        <circle cx="3.5" cy="19.5" r="1.1" fill="white" opacity="0.85"/>
        <circle cx="3.5" cy="12.5" r="1.1" fill="white" opacity="0.85"/>
        <!-- Network lines: center to outer -->
        <line x1="9" y1="16" x2="9" y2="9.5" stroke="white" stroke-width="0.8" opacity="0.45"/>
        <line x1="9" y1="16" x2="14.5" y2="12.5" stroke="white" stroke-width="0.8" opacity="0.45"/>
        <line x1="9" y1="16" x2="14.5" y2="19.5" stroke="white" stroke-width="0.8" opacity="0.45"/>
        <line x1="9" y1="16" x2="9" y2="22.5" stroke="white" stroke-width="0.8" opacity="0.45"/>
        <line x1="9" y1="16" x2="3.5" y2="19.5" stroke="white" stroke-width="0.8" opacity="0.45"/>
        <line x1="9" y1="16" x2="3.5" y2="12.5" stroke="white" stroke-width="0.8" opacity="0.45"/>
        <!-- Network lines: outer ring -->
        <line x1="9" y1="9.5" x2="14.5" y2="12.5" stroke="white" stroke-width="0.8" opacity="0.3"/>
        <line x1="14.5" y1="12.5" x2="14.5" y2="19.5" stroke="white" stroke-width="0.8" opacity="0.3"/>
        <line x1="14.5" y1="19.5" x2="9" y2="22.5" stroke="white" stroke-width="0.8" opacity="0.3"/>
        <line x1="9" y1="22.5" x2="3.5" y2="19.5" stroke="white" stroke-width="0.8" opacity="0.3"/>
        <line x1="3.5" y1="19.5" x2="3.5" y2="12.5" stroke="white" stroke-width="0.8" opacity="0.3"/>
        <line x1="3.5" y1="12.5" x2="9" y2="9.5" stroke="white" stroke-width="0.8" opacity="0.3"/>
        <!-- Connecting cable: network to phone -->
        <path d="M15 16 Q16 16 16 14 Q16 13 17 13" stroke="white" stroke-width="1.2" fill="none" opacity="0.6" stroke-linecap="round"/>
      </svg>
    </div>
    <h1>Red Brick Core</h1>
    <div class="subtitle">Root</div>
  </div>
  {% if error %}
  <div class="error">Неверный пароль</div>
  {% endif %}
  <form method="post">
    <div class="field">
      <label>Пароль</label>
      <input type="password" name="password" autofocus placeholder="Введите пароль">
    </div>
    <button type="submit">Войти</button>
  </form>
</div>
</body>
</html>
