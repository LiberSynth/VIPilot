<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>VK Publisher — Вход</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f13;
    color: #e8e8f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #1a1a24;
    border: 1px solid #2a2a38;
    border-radius: 16px;
    padding: 36px 28px;
    width: 100%;
    max-width: 360px;
  }
  .logo {
    text-align: center;
    margin-bottom: 28px;
  }
  .logo-icon {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, #4a7cf7, #6f4af7);
    border-radius: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    margin-bottom: 12px;
  }
  h1 { font-size: 20px; font-weight: 600; color: #fff; }
  .subtitle { font-size: 13px; color: #666; margin-top: 4px; }
  .field { margin-bottom: 16px; }
  label { display: block; font-size: 13px; color: #999; margin-bottom: 6px; font-weight: 500; }
  input[type=password] {
    width: 100%;
    background: #0f0f13;
    border: 1px solid #2a2a38;
    border-radius: 10px;
    padding: 13px 16px;
    font-size: 16px;
    color: #e8e8f0;
    outline: none;
    transition: border-color .2s;
  }
  input[type=password]:focus { border-color: #4a7cf7; }
  @keyframes autofillDetect { from {} to {} }
  input:-webkit-autofill { animation-name: autofillDetect; animation-duration: 1ms; }
  input:autofill { animation-name: autofillDetect; animation-duration: 1ms; }
  .error {
    background: rgba(255,80,80,.12);
    border: 1px solid rgba(255,80,80,.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: #ff6060;
    margin-bottom: 16px;
  }
  button {
    width: 100%;
    background: linear-gradient(135deg, #4a7cf7, #6f4af7);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
  }
  button:active { opacity: .85; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🎬</div>
    <h1>Red Brick Core</h1>
    <div class="subtitle">Управление публикациями</div>
  </div>
  {% if error %}
  <div class="error">Неверный пароль</div>
  {% endif %}
  <form method="post" id="loginForm">
    <div class="field">
      <label>Пароль</label>
      <input type="password" name="password" id="passwordField" autocomplete="current-password" placeholder="Введите пароль">
    </div>
    <button type="submit">Войти</button>
  </form>
</div>
<script>
  var field = document.getElementById('passwordField');

  // Метод 1: CSS-анимация срабатывает в момент автозаполнения браузером
  field.addEventListener('animationstart', function(e) {
    if (e.animationName === 'autofillDetect') {
      // Небольшая задержка, чтобы браузер успел установить значение
      setTimeout(function() {
        document.getElementById('loginForm').submit();
      }, 100);
    }
  });

  // Метод 2: Резервная проверка через короткий интервал (на случай Firefox и др.)
  var attempts = 0;
  var interval = setInterval(function() {
    attempts++;
    try {
      // Проверяем через matches, т.к. .value может быть пустым при автозаполнении
      if (field.matches(':-webkit-autofill') || field.matches(':autofill')) {
        clearInterval(interval);
        setTimeout(function() {
          document.getElementById('loginForm').submit();
        }, 100);
        return;
      }
    } catch(e) {}
    if (attempts >= 20) {
      clearInterval(interval);
      field.focus();
    }
  }, 100);
</script>
</body>
</html>
