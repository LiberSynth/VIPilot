{% macro panel_video(video_duration, video_fails_to_next) %}
  <!-- ══ ГЕНЕРАЦИЯ ВИДЕО ══ -->
  <div id="panel-request" class="tab-panel">
    <div class="card" style="margin-top:12px">
      <div class="card-title">Продолжительность видео</div>
      <div class="hint">Длина генерируемого видео в секундах.</div>
      <div class="lead-row">
        <input type="number" name="video_duration" id="video_duration" value="{{ video_duration }}" min="1" max="60" step="1">
        <span class="lead-unit">секунд</span>
      </div>
    </div>

    <div class="card" style="margin-top:12px">
      <div class="card-title">Модели</div>
      <div class="hint" style="margin-bottom:4px">Попыток на модель</div>
      <div style="margin-bottom:10px">
        <input type="number" name="video_fails_to_next" id="video_fails_to_next" value="{{ video_fails_to_next }}" min="1" max="99" step="1" style="max-width:120px">
      </div>
      <div class="hint" style="margin-bottom:8px">Активируйте одну или несколько. Порядок задаёт очерёдность перебора при сбое.</div>
      <div class="model-list" id="model-list">
        <div class="model-loading">Загрузка...</div>
      </div>
    </div>
  </div>
{% endmacro %}
