<header>
  <div class="header-top">
    <div class="header-left">
      <button class="hamburger" onclick="openSidebar()" aria-label="Меню" title="Открыть меню">
        <span></span><span></span><span></span>
      </button>
      <div class="header-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" fill="none" width="22" height="22" overflow="visible" shape-rendering="geometricPrecision">
          <circle cx="2" cy="37" r="4" fill="#00E8FF" opacity="0.9"/>
          <circle cx="14" cy="29" r="3.5" fill="#00E8FF" opacity="0.75"/>
          <circle cx="2" cy="25" r="3" fill="#00E8FF" opacity="0.7"/>
          <circle cx="10" cy="41" r="2.5" fill="#00E8FF" opacity="0.6"/>
          <line x1="2" y1="37" x2="14" y2="29" stroke="#00E8FF" stroke-width="2" opacity="0.5"/>
          <line x1="2" y1="25" x2="14" y2="29" stroke="#00E8FF" stroke-width="2" opacity="0.4"/>
          <line x1="2" y1="37" x2="10" y2="41" stroke="#00E8FF" stroke-width="1.8" opacity="0.4"/>
          <rect x="23.2" y="0.4" width="21.6" height="31.2" rx="4.8" fill="none" stroke="#E87840" stroke-width="4" opacity="0.9"/>
          <path d="M30.4 11.2 L30.4 20.8 L38.8 16 Z" fill="#E87840" opacity="0.9"/>
        </svg>
      </div>
      <h1 id="page-title">{{ page_title | default('') }}</h1>
    </div>
    <div class="header-center">
      <span id="header-clock"></span>
    </div>
    <div class="header-right">
      {% if nav_modules is defined and nav_modules %}
        {% for mod in nav_modules %}
          {% if mod.slug == 'root' %}
            <a href="/web" class="cycle-float-btn header-nav-btn" title="Настройки">
              <svg viewBox="0 0 16 16"><path d="M8 10.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5z"/><path d="M8 1.5v1.2M8 13.3v1.2M1.5 8h1.2M13.3 8h1.2M3.4 3.4l.85.85M11.75 11.75l.85.85M3.4 12.6l.85-.85M11.75 4.25l.85-.85"/></svg>
            </a>
          {% elif mod.slug == 'producer' %}
            <a href="/producer" class="cycle-float-btn header-nav-btn" title="Продюсер">
              <svg viewBox="0 0 16 16"><path d="M10.5 2.5l3 3L5 14H2v-3L10.5 2.5z"/></svg>
            </a>
          {% elif mod.slug == 'operator' %}
            <a href="/operator" class="cycle-float-btn header-nav-btn" title="Оператор">
              <svg viewBox="0 0 16 16"><rect x="1" y="2" width="14" height="9" rx="1.5"/><path d="M5 14h6M8 11v3"/></svg>
            </a>
          {% else %}
            <a href="/{{ mod.slug }}" class="cycle-float-btn header-nav-btn" title="{{ mod.slug }}">
              <svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="5.5"/></svg>
            </a>
          {% endif %}
        {% endfor %}
      {% endif %}
      <button class="cycle-float-btn header-nav-btn" title="Выйти" onclick="location.href='/logout'">
        <svg viewBox="0 0 16 16"><path d="M6 2H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3"/><polyline points="10,5 13,8 10,11"/><line x1="13" y1="8" x2="5" y2="8"/></svg>
      </button>
    </div>
  </div>
</header>
