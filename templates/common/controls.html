{% macro pools_card() %}
{% from "common/macros.html" import story_pool_hint %}
<div class="card" style="margin-top:12px">
  <div class="card-title">Пулы</div>
  <div class="wf-row" style="margin-top:4px">
    <div style="flex:1">
      <div class="toggle-label">Сюжеты для генерации видео</div>
      {{ story_pool_hint() }}
    </div>
  </div>
  <div class="wf-row" style="margin-top:12px;padding-top:10px;border-top:1px solid #1e1e2e">
    <div style="flex:1">
      <div class="toggle-label">Видео для публикации</div>
      <div class="hint" style="margin-top:2px">Для публикации используются только видео с оценкой «хорошо». Если пул пуст, батч завершается ошибкой.<br>Текущий пул: <span id="movie-pool-count" style="color:#f59e0b">…</span>.</div>
    </div>
  </div>
</div>
{% endmacro %}
